<!-- I2C Module Settings Popup -->
<div class="module-settings-popup">
  <h2>I2C Module Settings</h2>
  <form>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <label style="min-width:110px">Module Name:</label>
      <input type="text" name="module_name" style="flex:1;min-width:180px" />
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <label style="min-width:110px">Module ID (1-10):</label>
      <select class="module-num-select" name="module_num" disabled style="min-width:120px">
        <option value="">(none)</option>
        {% for i in range(1,11) %}
        <option value="{{ i }}">{{ i }}</option>
        {% endfor %}
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
      <label style="min-width:110px">I2C Address:</label>
      <input type="text" name="i2c_address" style="flex:1;min-width:180px" />
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
      <label style="min-width:110px">Set DIP Switches:</label>
      <div style="display:flex;gap:12px">
        <div class="dipswitch-group">
          <div class="dipswitch-label">SW1</div>
          <div class="dipswitch">
            <div class="dipswitch-slider dipswitch-off" id="dip1_slider" onclick="toggleDip(1)"></div>
            <div class="dipswitch-state" id="dip1_val">OFF</div>
            <input type="number" id="dip1" value="0" min="0" max="1" style="display:none;" />
          </div>
        </div>
        <div class="dipswitch-group">
          <div class="dipswitch-label">SW2</div>
          <div class="dipswitch">
            <div class="dipswitch-slider dipswitch-off" id="dip2_slider" onclick="toggleDip(2)"></div>
            <div class="dipswitch-state" id="dip2_val">OFF</div>
            <input type="number" id="dip2" value="0" min="0" max="1" style="display:none;" />
          </div>
        </div>
        <div class="dipswitch-group">
          <div class="dipswitch-label">SW3</div>
          <div class="dipswitch">
            <div class="dipswitch-slider dipswitch-off" id="dip3_slider" onclick="toggleDip(3)"></div>
            <div class="dipswitch-state" id="dip3_val">OFF</div>
            <input type="number" id="dip3" value="0" min="0" max="1" style="display:none;" />
          </div>
        </div>
      </div>
      <div style="margin-top:6px;font-size:12px;color:#666;">DIP1=+1, DIP2=+2, DIP3=+4 added to base I2C address 0x60.</div>
    </div>
    <div class="channels">
      <h3>Channel Names</h3>
      <div style="display:flex;gap:24px">
        <div>
          <h4>Channels 1-4</h4>
          <div style="display:flex;flex-direction:column;gap:4px">
            <div>
                <input type="text" name="ch1" placeholder="CH1 Name" style="width:90px" />
              <select name="type1">
                <option value="di">DI</option>
                <option value="do">DO</option>
                <option value="aio">AIO</option>
              </select>
                <input type="text" name="addr1" placeholder="Addr" style="width:50px" />
            </div>
            <div>
                <input type="text" name="ch2" placeholder="CH2 Name" style="width:90px" />
              <select name="type2">
                <option value="di">DI</option>
                <option value="do">DO</option>
                <option value="aio">AIO</option>
              </select>
                <input type="text" name="addr2" placeholder="Addr" style="width:50px" />
            </div>
            <div>
                <input type="text" name="ch3" placeholder="CH3 Name" style="width:90px" />
              <select name="type3">
                <option value="di">DI</option>
                <option value="do">DO</option>
                <option value="aio">AIO</option>
              </select>
                <input type="text" name="addr3" placeholder="Addr" style="width:50px" />
            </div>
            <div>
                <input type="text" name="ch4" placeholder="CH4 Name" style="width:90px" />
              <select name="type4">
                <option value="di">DI</option>
                <option value="do">DO</option>
                <option value="aio">AIO</option>
              </select>
                <input type="text" name="addr4" placeholder="Addr" style="width:50px" />
            </div>
          </div>
        </div>
        <div>
          <h4>Channels 5-8</h4>
          <div style="display:flex;flex-direction:column;gap:4px">
            <div>
                <input type="text" name="ch5" placeholder="CH5 Name" style="width:90px" />
              <select name="type5">
                <option value="di">DI</option>
                <option value="do">DO</option>
                <option value="aio">AIO</option>
              </select>
                <input type="text" name="addr5" placeholder="Addr" style="width:50px" />
            </div>
            <div>
                <input type="text" name="ch6" placeholder="CH6 Name" style="width:90px" />
              <select name="type6">
                <option value="di">DI</option>
                <option value="do">DO</option>
                <option value="aio">AIO</option>
              </select>
                <input type="text" name="addr6" placeholder="Addr" style="width:50px" />
            </div>
            <div>
                <input type="text" name="ch7" placeholder="CH7 Name" style="width:90px" />
              <select name="type7">
                <option value="di">DI</option>
                <option value="do">DO</option>
                <option value="aio">AIO</option>
              </select>
                <input type="text" name="addr7" placeholder="Addr" style="width:50px" />
            </div>
            <div>
                <input type="text" name="ch8" placeholder="CH8 Name" style="width:90px" />
              <select name="type8">
                <option value="di">DI</option>
                <option value="do">DO</option>
                <option value="aio">AIO</option>
              </select>
                <input type="text" name="addr8" placeholder="Addr" style="width:50px" />
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="form-actions" style="display:flex;justify-content:center;margin-top:18px;">
      <button type="button" class="global-save ext-global-save" style="background:#2d8cff;color:#fff;padding:8px 22px;border-radius:6px;border:none;">Save</button>
    </div>
  </form>
</div>
